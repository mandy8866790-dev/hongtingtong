<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>红听筒纪事 - The Red Receiver</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* --- 1. 设计系统 --- */
        :root {
            --bg-deep: #050505;
            --accent-gold: #E5D1A2;
            --font-main: 'Inter', system-ui, sans-serif;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-deep);
            color: #ffffff;
            font-family: var(--font-main);
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        /* --- 2. 视觉纹理 --- */
        .noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.04; pointer-events: none; z-index: 1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* --- 3. 待机大标题层 --- */
        .idle-layer {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; 
            z-index: 100; 
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: rgba(5,5,5,0.8); 
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            cursor: pointer; 
        }
        
        .idle-layer.hidden {
            opacity: 0; 
            pointer-events: none; 
            transform: scale(1.05);
        }

        .brand-title {
            font-weight: 200; font-size: 3.5rem; letter-spacing: 0.5em;
            margin: 0; margin-left: 0.5em; 
            color: rgba(255,255,255,0.9);
        }
        
        .brand-subtitle {
            margin-top: 1.5rem; font-size: 0.75rem; font-weight: 400;
            letter-spacing: 4px; text-transform: uppercase;
            color: var(--accent-gold); border-bottom: 1px solid rgba(229, 209, 162, 0.4);
            padding-bottom: 5px; display: inline-block;
        }
        
        .tap-hint {
            position: absolute; bottom: 50px;
            font-size: 0.7rem; color: rgba(255,255,255,0.3);
            letter-spacing: 2px; text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        /* --- 新增：全局常驻微标 (Global Logo) --- */
        .global-logo {
            position: fixed; 
            top: 35px; left: 40px; /* 位于左上角 */
            z-index: 50; 
            display: flex; flex-direction: column; gap: 4px;
            pointer-events: none; /* 防止遮挡视频点击 */
            opacity: 1;
            transform: translateY(0);
            transition: all 1s cubic-bezier(0.2, 0.8, 0.2, 1);
            text-shadow: 0 2px 10px rgba(0,0,0,0.8); /* 加点阴影防止在白色画面看不清 */
        }

        .global-logo.hidden {
            opacity: 0; 
            transform: translateY(-15px); /* 隐藏时往上挪一点，出现时有降落感 */
        }

        .global-logo .zh {
            font-size: 1.1rem; font-weight: 300; letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.8);
        }

        .global-logo .en {
            font-size: 0.6rem; font-weight: 400; letter-spacing: 2px;
            color: var(--accent-gold); text-transform: uppercase;
        }

        /* --- 4. 视频容器 --- */
        .video-container {
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0;
            z-index: 2; opacity: 0; transition: opacity 1s ease;
            background: #000;
        }
        .video-container.active { opacity: 1; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* --- 5. 状态提示层 --- */
        .status-overlay {
            position: absolute; top: 20px; right: 30px;
            z-index: 10;
            display: flex; align-items: center; gap: 10px;
            opacity: 0; transition: opacity 0.5s;
        }
        .status-overlay.show { opacity: 1; }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background-color: #555; box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        .status-text {
            font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase;
            color: rgba(255,255,255,0.6);
        }
        .status-overlay.playing .status-dot {
            background-color: var(--accent-gold);
            box-shadow: 0 0 10px var(--accent-gold);
            animation: pulse-dot 2s infinite;
        }
        .status-overlay.playing .status-text { color: var(--accent-gold); }

        .nfc-indicator {
            position: fixed; bottom: 20px; left: 20px;
            width: 10px; height: 10px; border-radius: 50%;
            background: #333; z-index: 100;
            transition: background 0.3s;
        }
        .nfc-indicator.connected { background: #2ecc71; box-shadow: 0 0 10px #2ecc71; }

        /* --- 影片简介弹出层 (Info Overlay) --- */
        .click-zone {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5; cursor: pointer; display: none; 
        }
        
        .info-card {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            z-index: 40; opacity: 0; pointer-events: none;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            background: none; padding: 0; border: none; box-shadow: none; 
            max-width: 80%; max-height: 80vh;
            display: flex; justify-content: center; align-items: center;
        }
        
        .info-card.show {
            opacity: 1; pointer-events: auto; 
            transform: translate(-50%, -50%) scale(1); cursor: pointer;
        }
        
        .info-card img {
            max-width: 100%; max-height: calc(80vh - 30px);
            object-fit: contain; border-radius: 16px; display: block;
        }

        /* --- 6. 底部 Dock --- */
        .dock-capsule {
            position: fixed; bottom: 40px; z-index: 50;
            display: flex; gap: 12px; padding: 12px;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 20px; backdrop-filter: blur(20px);
            opacity: 0; transform: translateY(20px);
            transition: all 0.8s ease; pointer-events: none; 
        }
        
        .dock-capsule.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .dock-capsule.visible.dock-hidden { opacity: 0; transform: translateY(20px); pointer-events: none; }
        
        .card-btn {
            width: 60px; height: 90px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1); background: #111;
            cursor: pointer; transition: all 0.4s ease;
            position: relative; overflow: hidden; padding: 0; pointer-events: auto;
        }
        .card-btn img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(100%) brightness(0.7); transition: all 0.4s ease;
        }
        .card-btn:hover img, .card-btn.active img {
            filter: grayscale(0%) brightness(1); transform: scale(1.05);
        }
        .card-btn.active {
            border-color: var(--accent-gold);
            box-shadow: 0 0 20px rgba(229, 209, 162, 0.2); transform: translateY(-5px);
        }

        /* --- 7. 硬件模拟 (听筒) --- */
        .hw-panel {
            position: fixed; right: 40px; top: 50%;
            transform: translateY(-50%); z-index: 60;
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            opacity: 0; pointer-events: none; transition: opacity 0.6s ease;
        }
        .hw-panel.visible { opacity: 1; pointer-events: auto; }

        .receiver-btn {
            width: 60px; height: 60px; border-radius: 50%;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center;
            font-size: 24px; cursor: pointer; transition: all 0.3s; color: #666;
        }
        .receiver-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .receiver-btn.active {
            background: var(--accent-gold); color: #000;
            box-shadow: 0 0 20px rgba(229, 209, 162, 0.4); transform: scale(1.1);
        }
        .hw-label {
            writing-mode: vertical-rl; text-orientation: mixed;
            font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.3); text-transform: uppercase;
        }

        /* --- 8. 全屏按钮 --- */
        .fs-btn {
            /* 修改：挪到了右下角，为左上角的 Logo 腾出空间 */
            position: fixed; bottom: 40px; right: 40px; 
            background: none; border: none; color: rgba(255,255,255,0.2);
            font-size: 1.2rem; cursor: pointer; z-index: 110;
            transition: color 0.3s;
        }
        .fs-btn:hover { color: #fff; }

        @keyframes pulse { 0% { opacity: 0.2; } 50% { opacity: 0.6; } 100% { opacity: 0.2; } }
        @keyframes pulse-dot { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="noise"></div>
    <button class="fs-btn" onclick="toggleFS()" title="全屏">⛶</button>
    <div class="nfc-indicator" id="nfc-status"></div>

    <div class="idle-layer" id="idle" onclick="startExperience()">
        <h1 class="brand-title">红听筒纪事</h1>
        <div class="brand-subtitle">The Red Receiver Chronicles</div>
        <div class="tap-hint">Tap Anywhere to Enter</div>
    </div>

    <div class="global-logo hidden" id="global-logo">
        <span class="zh">红听筒纪事</span>
        <span class="en">The Red Receiver</span>
    </div>

    <div class="video-container" id="vid-cont">
        <video id="player" playsinline>
            <source src="" type="video/mp4">
        </video>
    </div>

    <div class="click-zone" id="click-zone" onclick="toggleInfo()"></div>

    <div class="info-card" id="info-card" onclick="toggleInfo()">
        <img id="info-img" src="" alt="Movie Information">
    </div>

    <div class="status-overlay" id="status-ui">
        <div class="status-dot"></div>
        <div class="status-text" id="status-text">Preview Mode</div>
    </div>

    <div class="dock-capsule" id="dock"></div>

    <div class="hw-panel" id="hw-panel">
        <span class="hw-label">Receiver</span>
        <div class="receiver-btn" id="rec-btn" onclick="toggleReceiver()" title="点击切换听筒状态">
            📞
        </div>
        <span class="hw-label">Control</span>
    </div>

    <script>
        // ================= 配置区 =================
        const cardMapping = {
            "0499BB02CD2A81": 1,
            "0484C900CD2A81": 2,
            "04A16D0ECC2A81": 3,
            "0467B40FCC2A81": 4,
            "04B2260FCC2A81": 5
        };

        const stories = [
            { id: 1, cover: "images/01.jpg", info: "images/info/info01.png", demo: "videos/demo/demo01.mp4", full: "videos/movie/movie 1.mp4" },
            { id: 2, cover: "images/02.jpg", info: "images/info/info02.png", demo: "videos/demo/demo02.mp4", full: "videos/movie/movie 2.mp4" },
            { id: 3, cover: "images/03.jpg", info: "images/info/info03.png", demo: "videos/demo/demo03.mp4", full: "videos/movie/movie 3.mp4" },
            { id: 4, cover: "images/04.jpg", info: "images/info/info04.png", demo: "videos/demo/demo04.mp4", full: "videos/movie/movie 4.mp4" },
            { id: 5, cover: "images/05.jpg", info: "images/info/info05.png", demo: "videos/demo/demo05.mp4", full: "videos/movie/movie 5.mp4" }
        ];
        // ===========================================

        let player, vidCont, idle, dock, recBtn, hwPanel, statusUI, statusText, nfcStatus, globalLogo;
        let clickZone, infoCard, infoImg;
        
        let currentStoryIndex = -1;
        let isCardMode = false;
        let isReceiverLifted = false;
        let hasStarted = false; 
        let dockTimeout; 
        let isInfoVisible = false;

        document.addEventListener('DOMContentLoaded', () => {
            player = document.getElementById('player');
            vidCont = document.getElementById('vid-cont');
            idle = document.getElementById('idle');
            dock = document.getElementById('dock');
            recBtn = document.getElementById('rec-btn');
            hwPanel = document.getElementById('hw-panel');
            statusUI = document.getElementById('status-ui');
            statusText = document.getElementById('status-text');
            nfcStatus = document.getElementById('nfc-status');
            globalLogo = document.getElementById('global-logo'); // 获取新加的全局 Logo
            
            clickZone = document.getElementById('click-zone');
            infoCard = document.getElementById('info-card');
            infoImg = document.getElementById('info-img');

            initDock();
            connectWebSocket();

            // 鼠标移动隐藏逻辑
            document.addEventListener('mousemove', (e) => {
                if (!hasStarted || !isCardMode) return;
                
                clearTimeout(dockTimeout);
                dock.classList.remove('dock-hidden');
                
                if (window.innerHeight - e.clientY > 180) {
                    dockTimeout = setTimeout(() => {
                        dock.classList.add('dock-hidden');
                    }, 2000);
                }
            });
        });

        function startExperience() {
            if(hasStarted) return; 
            hasStarted = true;
            
            idle.classList.add('hidden');
            dock.classList.add('visible');
            
            // 触发：显示左上角全局 Logo
            globalLogo.classList.remove('hidden');

            manualSelect(0);
        }

        function connectWebSocket() {
            try {
                const socket = new WebSocket('ws://localhost:8765');
                socket.onopen = () => { console.log("NFC Connected"); if(nfcStatus) nfcStatus.classList.add('connected'); };
                socket.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        if (data.type === 'card_tap') handleCardTap(data.uid);
                    } catch(e) {}
                };
                socket.onclose = () => { if(nfcStatus) nfcStatus.classList.remove('connected'); setTimeout(connectWebSocket, 3000); };
                socket.onerror = () => { socket.close(); };
            } catch (err) {}
        }

        function toggleInfo() {
            if (isCardMode || currentStoryIndex === -1) return; 

            isInfoVisible = !isInfoVisible;
            if (isInfoVisible) {
                infoCard.classList.add('show');
            } else {
                infoCard.classList.remove('show');
            }
        }

        function handleCardTap(uid) {
            if(!hasStarted) startExperience();

            const storyId = cardMapping[uid];
            if (storyId) {
                currentStoryIndex = storyId - 1;
                isCardMode = true;        
                isReceiverLifted = false; 
                updateUIAndPlay();
            }
        }

        function manualSelect(index) {
            currentStoryIndex = index;
            isCardMode = false;       
            isReceiverLifted = false; 
            updateUIAndPlay();
        }

        function resetDockTimer() {
            if (!hasStarted) return;
            clearTimeout(dockTimeout);
            dock.classList.remove('dock-hidden');
            
            if (isCardMode) {
                dockTimeout = setTimeout(() => {
                    dock.classList.add('dock-hidden');
                }, 2000);
            }
        }

        function updateUIAndPlay() {
            if (currentStoryIndex === -1 || !stories[currentStoryIndex]) return;
            const story = stories[currentStoryIndex];

            const btns = document.querySelectorAll('.card-btn');
            btns.forEach(b => b.classList.remove('active'));
            if(btns[currentStoryIndex]) btns[currentStoryIndex].classList.add('active');

            vidCont.classList.add('active');
            statusUI.classList.add('show');

            if (isCardMode) hwPanel.classList.add('visible');
            else hwPanel.classList.remove('visible');

            isInfoVisible = false;
            infoCard.classList.remove('show');
            infoImg.src = story.info || ""; 
            
            if (!isCardMode) {
                clickZone.style.display = 'block';
            } else {
                clickZone.style.display = 'none';
            }

            resetDockTimer();

            let targetSrc = "";
            let targetLoop = false;
            let targetMuted = true;
            let targetStatusText = "";
            let isPlayingMode = false;

            if (isReceiverLifted) {
                targetSrc = story.full;
                targetLoop = false;
                targetMuted = false;
                targetStatusText = "Playing Record...";
                isPlayingMode = true;
                recBtn.classList.add('active');
            } else if (isCardMode) {
                targetSrc = story.full;
                targetLoop = true;
                targetMuted = true;
                targetStatusText = "Ready to Play";
                isPlayingMode = false;
                recBtn.classList.remove('active');
            } else {
                targetSrc = story.demo;
                targetLoop = true;
                targetMuted = true;
                targetStatusText = "Preview Mode";
                isPlayingMode = false;
                recBtn.classList.remove('active');
            }

            const currentSrcDecoded = decodeURIComponent(player.src);
            const targetSrcDecoded = targetSrc;
            
            if (!currentSrcDecoded.includes(targetSrcDecoded)) {
                player.src = targetSrc;
                player.play().catch(e => console.log("等待交互许可"));
            } else {
                if(player.paused) player.play().catch(e => {});
            }

            player.muted = targetMuted;
            player.loop = targetLoop;

            statusText.innerText = targetStatusText;
            if (isPlayingMode) statusUI.classList.add('playing');
            else statusUI.classList.remove('playing');
        }

        function initDock() {
            if(!dock) return;
            dock.innerHTML = '';
            stories.forEach((story, index) => {
                const btn = document.createElement('button');
                btn.className = 'card-btn';
                btn.innerHTML = `<img src="${story.cover}" alt="${story.id}" onerror="this.style.display='none';this.parentNode.innerText='${story.id}'">`;
                btn.onclick = (e) => {
                    e.stopPropagation(); 
                    manualSelect(index);
                };
                dock.appendChild(btn);
            });
        }

        function toggleReceiver() {
            if (!isCardMode) return;
            isReceiverLifted = !isReceiverLifted;
            updateUIAndPlay();
        }

        function toggleFS() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
